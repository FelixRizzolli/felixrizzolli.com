services:
  api:
    container_name: "felixrizzolli-com-api"
    image: ghcr.io/felixrizzolli/felixrizzolli-com-api:${API_VERSION:-latest}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=${API_PORT}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT}
      HOSTNAME: ${API_HOST}
    env_file:
      - path: ./.env.prod
        required: true
    volumes:
      - payload-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://${API_HOST}:${API_PORT}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped
    networks:
      - traefik-public  # Traefik routes HTTPS traffic here
      - felixrizzolli   # Database access
    depends_on:
      postgres:
        condition: service_healthy