services:
  wedding:
    container_name: "felixrizzolli-com-wedding"
    image: ghcr.io/felixrizzolli/felixrizzolli-com-wedding:${WEDDING_VERSION:-latest}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wedding.rule=Host(`${WEDDING_DOMAIN}`)"
      - "traefik.http.routers.wedding.entrypoints=websecure"
      - "traefik.http.routers.wedding.tls.certresolver=letsencrypt"
      - "traefik.http.services.wedding.loadbalancer.server.port=${WEDDING_PORT}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${WEDDING_PORT}
      HOST: ${WEDDING_HOST}
    env_file:
      - path: ./.env.prod
        required: true
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://${WEDDING_HOST}:${WEDDING_PORT}",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped
    networks:
      - traefik-public
    depends_on:
      api:
        condition: service_healthy