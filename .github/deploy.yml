name: Automated Deployment

on:
  repository_dispatch:
    types: [api-updated, www-updated, docs-updated, wedding-updated, traveling-updated]
  workflow_dispatch:
    inputs:
      service:
        type: choice
        options: [all, api, www, docs, wedding, traveling]
        default: all

concurrency:
  # Ensure only one run of this workflow executes at a time; subsequent runs will wait (queue)
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            # Map event types to services
            SERVICE="${{ github.event.action || inputs.service }}"
            if [ "$SERVICE" = "api-updated" ]; then
              SERVICE="api"
            elif [ "$SERVICE" = "www-updated" ]; then
              SERVICE="www"
            elif [ "$SERVICE" = "docs-updated" ]; then
              SERVICE="docs"
            elif [ "$SERVICE" = "wedding-updated" ]; then
              SERVICE="wedding"
            elif [ "$SERVICE" = "traveling-updated" ]; then
              SERVICE="traveling"
            fi
            bash /var/www/felixrizzolli.com/scripts/deploy.sh "$SERVICE"

      - name: Health check
        run: |
          sleep 30
          curl -f https://felixrizzolli.com || exit 1
          curl -f https://api.felixrizzolli.com/_health || exit 1
#          curl -f https://www.felixrizzolli.com/_health || exit 1
#          curl -f https://docs.felixrizzolli.com/_health || exit 1
          curl -f https://wedding.kraeuterakademie.it/_health || exit 1
#          curl -f https://traveling.felixrizzolli.com/_health || exit 1